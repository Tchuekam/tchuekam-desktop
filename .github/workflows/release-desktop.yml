name: Release TchueKAM Desktop

# Triggered by pushing a semver tag (v1.2.3) or manually via the Actions tab.
# Builds installers for Windows, macOS (arm64 + x64), and Linux, then publishes
# them as a draft GitHub Release. You review + click Publish on github.com to
# go live — which is when electron-updater picks the new version up.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.16.0) — must already exist as a git tag'
        required: true

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Build + publish installers
        working-directory: apps/desktop
        env:
          # electron-builder reads GH_TOKEN to upload assets to the release
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: skip mac code signing in CI if you haven't set up certs yet
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          npx electron-builder --publish always
